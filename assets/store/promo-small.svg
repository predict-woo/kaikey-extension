<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="shield" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="440" height="280" fill="url(#bg)"/>
  <rect x="0" y="0" width="440" height="280" fill="url(#glow)"/>

  <!-- Shield icon, larger and vertically centered -->
  <g transform="translate(40,70) scale(0.135)">
    <path
      fill="url(#shield)"
      d="M512 168
         L780 264
         L780 528
         C780 690 666 808 512 856
         C358 808 244 690 244 528
         L244 264
         Z"/>
    <path
      fill="none"
      stroke="#1d4ed8"
      stroke-width="64"
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M380 528 L478 626 L660 444"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="145" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="68" font-weight="700" letter-spacing="-1.5">Kaikey</text>

  <!-- Tagline -->
  <text x="202" y="180" fill="#e0f2fe" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="500">2FA, in your browser</text>
</svg>
